<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajam Jamaludin | Geophysics Researcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" id="main-css">
</head>
<body>
  <header id="site-header">
    <button id="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    <nav id="main-nav" aria-label="Main navigation">
      <a href="#about">Home</a>
      <a href="#projects">Projects</a>
      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>
  <main>
    <section id="about" role="region" aria-labelledby="heading-about">
      <h2 id="heading-about">About</h2>
      <p>About section placeholder — content coming in Phase 2.</p>
    </section>
    <section id="projects" role="region" aria-labelledby="heading-projects">
      <h2 id="heading-projects">Projects</h2>
      <p>Projects section placeholder — content coming in Phase 2.</p>
    </section>
    <section id="skills" role="region" aria-labelledby="heading-skills">
      <h2 id="heading-skills">Skills</h2>
      <p>Skills section placeholder — content coming in Phase 2.</p>
    </section>
    <section id="contact" role="region" aria-labelledby="heading-contact">
      <h2 id="heading-contact">Contact</h2>
      <p>Contact section placeholder — content coming in Phase 2.</p>
    </section>
  </main>
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const mainNav = document.getElementById('main-nav');
    if (menuToggle && mainNav) {
      menuToggle.addEventListener('click', function() {
        mainNav.classList.toggle('is-open');
        const isOpen = mainNav.classList.contains('is-open');
        menuToggle.setAttribute('aria-expanded', isOpen);
      });
      // Close menu when clicking a nav link
      mainNav.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
          mainNav.classList.remove('is-open');
          menuToggle.setAttribute('aria-expanded', 'false');
        });
      });
    }
  </script>
</body>
</html>
